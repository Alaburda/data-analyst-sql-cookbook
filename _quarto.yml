        - 01-basics/using-sql-in-r.qmd
        - 01-basics/using-sql-in-dbt.qmd
        - 01-basics/joins.qmd
        - 01-basics/window-functions.qmd
        - 01-basics/filtering.qmd
    - part: 02-models/models.qmd
      chapters:
        - 02-models/calendar-date-dimension.qmd
        - 02-models/factless-fact-tables.qmd
        - 02-models/ragged-depth-hierarchies.qmd
    - part: 03-recipes/recipes.qmd
      chapters:
        - 03-recipes/queries_with_dates.qmd
        - 03-recipes/pivoting-and-unpivoting.qmd
        - 03-recipes/customer-analytics.qmd
    - misc/goodies.qmd
